<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>新书筹备中 | 知微书舍</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="home-page bookshelf-page">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <header class="site-header fade-section visible">
    <a class="brand" href="index.html">
      <span class="brand-mark">藏</span>
      <span class="brand-copy">
        <strong>知微书舍</strong>
        <small>新书预告</small>
      </span>
    </a>
  </header>

  <main class="page-shell">
    <section class="library-hero fade-section visible">
      <article class="panel library-intro">
        <p class="eyebrow">新书预告</p>
        <h1>第二本书正在筹备中。</h1>
        <p class="hero-tagline">
          新故事还在打磨，正式上架后会第一时间在这里开放阅读入口。现在你也可以先回书架，或者继续看第一本书。
        </p>
        <div class="hero-actions">
          <a class="button button-primary" href="index.html">返回书架</a>
          <a class="button button-secondary" href="reader.html?chapter=39">先看第一本书</a>
        </div>
      </article>

      <aside class="panel library-feature">
        <div class="panel-heading">
          <span>即将上新</span>
          <h2>上新预告</h2>
        </div>
        <div class="library-stats">
          <div>
            <span>当前状态</span>
            <strong class="library-stat-value">筹备中</strong>
          </div>
          <div>
            <span>阅读入口</span>
            <strong class="library-stat-value">即将开放</strong>
          </div>
          <div>
            <span>上新方式</span>
            <strong class="library-stat-value">书架同步通知</strong>
          </div>
          <div>
            <span>建议</span>
            <strong class="library-stat-value">先收藏本站</strong>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <footer class="site-footer fade-section visible">
    <p>新书上线后，这里会直接开放阅读入口。</p>
    <a href="index.html">回到首页</a>
  </footer>
</body>
</html>
