<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="小说章节阅读页。">
  <title>章节阅读 | 小说站</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="assets/js/novel-data.js"></script>
  <script defer src="assets/js/reader.js"></script>
</head>
<body class="reader-page">
  <div class="reader-progress">
    <span id="reading-progress-bar"></span>
  </div>

  <header class="reader-header visible">
    <a class="reader-home-link" href="index.html">返回首页</a>
    <div class="reader-header-copy">
      <p id="reader-site-title">Novel Residence</p>
      <h1 id="reader-chapter-title">章节标题</h1>
    </div>
    <div class="reader-header-actions">
      <div class="reader-header-meta" id="reader-header-meta"></div>
      <details class="history-widget">
        <summary class="history-trigger">
          <span>观看记录</span>
          <strong id="reader-history-count">0</strong>
        </summary>
        <div class="history-panel">
          <div class="history-panel-head">
            <span>Recent</span>
            <h2>最近阅读</h2>
          </div>
          <div class="history-list" id="reader-history-list"></div>
          <p class="history-empty" id="reader-history-empty" hidden>还没有阅读记录，读过章节后这里会自动出现。</p>
        </div>
      </details>
    </div>
  </header>

  <main class="reader-layout">
    <aside class="reader-sidebar visible">
      <div class="sidebar-heading">
        <span>Catalog</span>
        <h2>章节目录</h2>
      </div>
      <div class="reader-search">
        <label class="search-box" for="reader-chapter-search">
          <span>Search</span>
          <input
            id="reader-chapter-search"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="搜索章节标题、章节号或内容关键词"
          >
        </label>
        <p class="search-summary" id="reader-search-summary">共 0 章</p>
      </div>
      <div class="reader-catalog" id="reader-catalog"></div>
      <p class="search-empty" id="reader-search-empty" hidden>暂时没有找到相关章节，换个关键词再试试。</p>
    </aside>

    <article class="reader-article visible">
      <div class="reader-article-head">
        <p class="eyebrow" id="reader-chapter-label">Chapter</p>
        <h2 id="reader-article-title">章节标题</h2>
        <p class="reader-article-meta" id="reader-article-meta">更新于 2026-04-01</p>
      </div>

      <div class="reader-copy is-loading" id="chapter-content">
        <p>正在加载章节内容...</p>
      </div>

      <nav class="reader-nav" id="reader-nav"></nav>
    </article>
  </main>
</body>
</html>
